name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # -----------------------------------------------------------------------
  # Build
  # -----------------------------------------------------------------------
  # The engine's window/render crates require a native GPU backend that is
  # only configured for macOS (wgpu "metal" feature).  On all platforms we
  # therefore build the platform-agnostic workspace members; on macOS we
  # additionally verify the full workspace compiles.
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-build-

      # Build the crates that have no platform-specific GPU/windowing
      # dependencies — these must compile on every OS.
      - name: Build platform-agnostic crates
        run: >
          cargo build
          -p ecs
          -p essential
          -p app
          -p animation
          -p physics

      # Build the full workspace on macOS, where the wgpu metal backend is
      # available and winit has native support.
      - name: Build full workspace (macOS only)
        if: matrix.os == 'macos-latest'
        run: cargo build --workspace

  # -----------------------------------------------------------------------
  # Test
  # -----------------------------------------------------------------------
  # Run all unit tests.  Currently tests live in the platform-agnostic crates
  # (ecs, essential) so this job runs identically on every OS.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-test-

      - name: Run tests
        run: cargo test -p ecs -p essential
