[profile.release]
strip = true

[package]
name = "game-engine"
version = "0.1.0"
edition = "2021"

[workspace]
members = ["crates/*"]

[dependencies]
app = { path = "crates/app" }
core = { path = "crates/core" }
render = { path = "crates/render" }
window = { path = "crates/window" }
cfg-if = "1"

[target.'cfg(target_arch = "wasm32")'.dependencies]
console_error_panic_hook = "0.1.6"
console_log = "1.0"
wgpu = { version = "24.0", features = ["webgl"] }
